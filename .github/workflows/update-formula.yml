name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          FORMULA="${{ github.event.client_payload.formula }}"
          VERSION="${{ github.event.client_payload.version }}"
          SHA_ARM64="${{ github.event.client_payload.sha_arm64 }}"
          SHA_X64="${{ github.event.client_payload.sha_x64 }}"

          echo "Updating $FORMULA to version $VERSION"

          # Download all release assets to get checksums
          REPO="tool3/${FORMULA}-cli"

          # Get all checksums from the release
          CHECKSUMS=$(curl -fsSL "https://github.com/${REPO}/releases/download/v${VERSION}/checksums.txt")

          SHA_DARWIN_ARM64=$(echo "$CHECKSUMS" | grep "darwin-arm64.tar.gz" | cut -d ' ' -f 1)
          SHA_DARWIN_X64=$(echo "$CHECKSUMS" | grep "darwin-x64.tar.gz" | cut -d ' ' -f 1)
          SHA_LINUX_ARM64=$(echo "$CHECKSUMS" | grep "linux-arm64.tar.gz" | cut -d ' ' -f 1)
          SHA_LINUX_X64=$(echo "$CHECKSUMS" | grep "linux-x64.tar.gz" | cut -d ' ' -f 1)

          # Create the formula
          cat > "Formula/${FORMULA}.rb" << 'FORMULA_EOF'
          class Shellfie < Formula
            desc "Transform terminal output into beautiful SVG images"
            homepage "https://github.com/tool3/shellfie-cli"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/tool3/shellfie-cli/releases/download/vVERSION_PLACEHOLDER/shellfie-darwin-arm64.tar.gz"
                sha256 "SHA_DARWIN_ARM64_PLACEHOLDER"
              else
                url "https://github.com/tool3/shellfie-cli/releases/download/vVERSION_PLACEHOLDER/shellfie-darwin-x64.tar.gz"
                sha256 "SHA_DARWIN_X64_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/tool3/shellfie-cli/releases/download/vVERSION_PLACEHOLDER/shellfie-linux-arm64.tar.gz"
                sha256 "SHA_LINUX_ARM64_PLACEHOLDER"
              else
                url "https://github.com/tool3/shellfie-cli/releases/download/vVERSION_PLACEHOLDER/shellfie-linux-x64.tar.gz"
                sha256 "SHA_LINUX_X64_PLACEHOLDER"
              end
            end

            def install
              if Hardware::CPU.arm?
                if OS.mac?
                  bin.install "shellfie-darwin-arm64" => "shellfie"
                else
                  bin.install "shellfie-linux-arm64" => "shellfie"
                end
              else
                if OS.mac?
                  bin.install "shellfie-darwin-x64" => "shellfie"
                else
                  bin.install "shellfie-linux-x64" => "shellfie"
                end
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/shellfie --version")
            end
          end
          FORMULA_EOF

          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" "Formula/${FORMULA}.rb"
          sed -i "s/SHA_DARWIN_ARM64_PLACEHOLDER/${SHA_DARWIN_ARM64}/g" "Formula/${FORMULA}.rb"
          sed -i "s/SHA_DARWIN_X64_PLACEHOLDER/${SHA_DARWIN_X64}/g" "Formula/${FORMULA}.rb"
          sed -i "s/SHA_LINUX_ARM64_PLACEHOLDER/${SHA_LINUX_ARM64}/g" "Formula/${FORMULA}.rb"
          sed -i "s/SHA_LINUX_X64_PLACEHOLDER/${SHA_LINUX_X64}/g" "Formula/${FORMULA}.rb"

          cat "Formula/${FORMULA}.rb"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git commit -m "Update ${{ github.event.client_payload.formula }} to ${{ github.event.client_payload.version }}"
          git push
