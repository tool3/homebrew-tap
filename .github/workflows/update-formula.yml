name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          FORMULA="${{ github.event.client_payload.formula }}"
          VERSION="${{ github.event.client_payload.version }}"
          REPO="${{ github.event.client_payload.repo }}"

          echo "Updating $FORMULA to version $VERSION (repo: $REPO)"

          FORMULA_FILE="Formula/${FORMULA}.rb"

          if [ ! -f "$FORMULA_FILE" ]; then
            echo "Error: Formula file $FORMULA_FILE not found"
            exit 1
          fi

          # Get all checksums from the release
          CHECKSUMS=$(curl -fsSL "https://github.com/${REPO}/releases/download/v${VERSION}/checksums.txt")

          SHA_DARWIN_ARM64=$(echo "$CHECKSUMS" | grep "darwin-arm64.tar.gz" | cut -d ' ' -f 1)
          SHA_DARWIN_X64=$(echo "$CHECKSUMS" | grep "darwin-x64.tar.gz" | cut -d ' ' -f 1)
          SHA_LINUX_ARM64=$(echo "$CHECKSUMS" | grep "linux-arm64.tar.gz" | cut -d ' ' -f 1)
          SHA_LINUX_X64=$(echo "$CHECKSUMS" | grep "linux-x64.tar.gz" | cut -d ' ' -f 1)

          # Get the current version from the formula
          OLD_VERSION=$(grep -m1 '^\s*version ' "$FORMULA_FILE" | sed 's/.*"\(.*\)".*/\1/')
          echo "Updating from $OLD_VERSION to $VERSION"

          # Update version
          sed -i "s/version \"${OLD_VERSION}\"/version \"${VERSION}\"/" "$FORMULA_FILE"

          # Update download URLs (replace old version in URLs)
          sed -i "s|/download/v${OLD_VERSION}/|/download/v${VERSION}/|g" "$FORMULA_FILE"

          # Update sha256 checksums in order of appearance
          # The order in the formula is: darwin-arm64, darwin-x64, linux-arm64, linux-x64
          python3 - "$FORMULA_FILE" "$SHA_DARWIN_ARM64" "$SHA_DARWIN_X64" "$SHA_LINUX_ARM64" "$SHA_LINUX_X64" << 'PYEOF'
          import sys
          import re

          formula_file = sys.argv[1]
          new_shas = sys.argv[2:6]

          with open(formula_file, 'r') as f:
              content = f.read()

          sha_pattern = re.compile(r'sha256 "[a-f0-9]{64}"')
          matches = list(sha_pattern.finditer(content))

          if len(matches) != len(new_shas):
              print(f"Error: found {len(matches)} sha256 entries but expected {len(new_shas)}")
              sys.exit(1)

          # Replace in reverse order to preserve positions
          for match, new_sha in reversed(list(zip(matches, new_shas))):
              content = content[:match.start()] + f'sha256 "{new_sha}"' + content[match.end():]

          with open(formula_file, 'w') as f:
              f.write(content)
          PYEOF

          cat "$FORMULA_FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git commit -m "Update ${{ github.event.client_payload.formula }} to ${{ github.event.client_payload.version }}"
          git push
